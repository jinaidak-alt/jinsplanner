<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- PWA -->
  <link rel="manifest" href="/jinsplanner/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="한걸음">
  <link rel="apple-touch-icon" href="/jinsplanner/icons/icon-192.png">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>데일리 할 일</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f4f8;min-height:100vh;}
    .app{max-width:1024px;margin:0 auto;padding-bottom:100px;}

    /* ── Tab bar ── */
    .tab-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;padding:0 8px;}
    .tab-btn{flex:1;padding:14px 0;border:none;background:none;font-size:14px;font-weight:500;color:#9ca3af;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
    .tab-btn.active{color:#6366f1;border-bottom-color:#6366f1;font-weight:700;}
    .tab-btn[data-tab="area"].active{color:#ea580c;border-bottom-color:#fb923c;}

    /* ── View ── */
    .view{display:none;padding:14px;}
    .view.active{display:block;}

    /* ── Card ── */
    .card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px;}

    /* ── Nav row ── */
    .nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .nav-center{text-align:center;}
    .nav-label{font-size:17px;font-weight:700;color:#111827;}
    .nav-sub{font-size:12px;color:#6b7280;margin-top:2px;}
    .nav-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .nav-btn:hover{background:#f3f4f6;}
    .today-btn{display:none;padding:2px 10px;border:none;border-radius:999px;background:#ede9fe;color:#7c3aed;font-size:11px;font-weight:600;cursor:pointer;}

    /* ── Progress ── */
    .progress-bar-bg{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:8px 0 4px;}
    .progress-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .4s ease;}
    .progress-label{font-size:13px;color:#6b7280;display:flex;justify-content:space-between;}
    .big-pct{font-size:38px;font-weight:800;color:#6366f1;line-height:1;margin:6px 0 2px;}

    /* ── Daily routine item ── */
    .routine-list{display:flex;flex-direction:column;gap:8px;}
    .routine-item{display:flex;align-items:center;gap:10px;padding:13px 14px;background:#fff;border-radius:11px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:opacity .2s;}
    .routine-item.done{opacity:.5;}
    .routine-item.dragging{opacity:.35;box-shadow:none;}
    .routine-item.drag-over{outline:2px dashed #6366f1;outline-offset:-2px;}
    .cat-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;}
    .check-btn{width:24px;height:24px;border-radius:50%;border:2px solid #d1d5db;background:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:all .2s;}
    .routine-info{flex:1;min-width:0;}
    .routine-text{font-size:15px;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .routine-item.done .routine-text{text-decoration:line-through;color:#9ca3af;}
    .routine-time{font-size:12px;color:#9ca3af;margin-top:2px;}
    .cat-badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;flex-shrink:0;}
    .icon-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:6px;line-height:1;color:#d1d5db;flex-shrink:0;transition:color .2s;}
    .icon-btn:hover{color:#6b7280;}
    .empty{text-align:center;padding:36px 0;color:#9ca3af;font-size:14px;line-height:1.8;}

    /* ── Banner ── */
    .banner{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:12px;padding:13px;text-align:center;font-size:15px;font-weight:600;margin-bottom:12px;}

    /* ── Overdue / Urgent ── */
    .overdue-card{background:#fff;border:1.5px solid #ef4444;border-radius:14px;padding:14px 16px;margin-bottom:12px;}
    .urgent-card{background:#fff;border:1.5px solid #f97316;border-radius:14px;padding:14px 16px;margin-bottom:12px;}
    .section-hd{font-size:14px;font-weight:700;margin-bottom:10px;}
    .overdue-card .section-hd{color:#ef4444;}
    .urgent-card .section-hd{color:#f97316;}

    /* ════════════════════════════════
       WEEKLY VIEW - column layout
       ════════════════════════════════ */
    .week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin:0 -14px;padding:0 14px 4px;}
    .week-cols{display:flex;gap:6px;min-width:940px;}
    .week-col{flex:1;min-width:130px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;}
    .week-col.is-today{box-shadow:0 0 0 2px #6366f1,0 1px 6px rgba(99,102,241,.2);}
    .week-col-head{padding:10px 8px 8px;border-bottom:1px solid #f3f4f6;text-align:center;}
    .wc-dayname{font-size:11px;color:#6b7280;font-weight:600;}
    .week-col.is-today .wc-dayname{color:#6366f1;}
    .wc-date{font-size:13px;font-weight:700;color:#111827;margin:2px 0;}
    .week-col.is-today .wc-date{color:#6366f1;}
    .wc-bar-bg{height:4px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:4px 0 2px;}
    .wc-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .4s;}
    .wc-pct{font-size:11px;color:#6b7280;font-weight:500;}
    .week-col.is-today .wc-pct{color:#6366f1;font-weight:700;}
    .week-col-body{padding:8px 6px;}
    .week-col.drag-target{box-shadow:0 0 0 2px #8b5cf6,0 1px 6px rgba(139,92,246,.2);}
    .wc-item{display:flex;align-items:flex-start;gap:4px;padding:5px 4px;border-radius:7px;cursor:pointer;transition:background .15s;position:relative;}
    .wc-item:hover{background:#f9fafb;}
    .wc-item.done .wc-name{text-decoration:line-through;color:#9ca3af;}
    .wc-check{width:16px;height:16px;border-radius:50%;border:1.5px solid #d1d5db;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;margin-top:1px;cursor:pointer;transition:all .15s;}
    .wc-body{flex:1;min-width:0;}
    .wc-dot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
    .wc-name{font-size:12px;color:#374151;line-height:1.3;}
    .wc-time{font-size:10px;color:#9ca3af;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .wc-edit{opacity:0;font-size:11px;padding:1px 3px;background:none;border:none;cursor:pointer;color:#9ca3af;transition:opacity .15s;flex-shrink:0;}
    .wc-item:hover .wc-edit{opacity:1;}
    .wc-empty{font-size:10px;color:#d1d5db;text-align:center;padding:10px 4px;}

    /* weekly summary card */
    .week-summary{display:flex;align-items:center;gap:16px;}
    .week-big-pct{font-size:34px;font-weight:800;color:#6366f1;line-height:1;}
    .week-sub{font-size:12px;color:#6b7280;margin-top:2px;}

    /* ════════════════════════════════
       MONTHLY VIEW
       ════════════════════════════════ */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:calc((min(100vw,640px) - 98px) / 7);gap:3px;margin-top:10px;}
    .cal-hd{font-size:11px;text-align:center;color:#6b7280;padding:4px 0;font-weight:600;}
    .cal-hd.sun{color:#ef4444;}.cal-hd.sat{color:#3b82f6;}
    .cal-day{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:transform .1s,box-shadow .1s;-webkit-tap-highlight-color:transparent;overflow:hidden;}
    .cal-day:not(.empty):hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,.12);}
    .cal-day.empty{pointer-events:none;}
    .cal-day.is-today{outline:2px solid #6366f1;}
    .cal-day.selected{box-shadow:0 0 0 2.5px #6366f1;}
    .cal-circle{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;line-height:1;}
    .cal-num{font-size:12px;font-weight:600;color:#374151;}
    .cal-num.faded{color:#d1d5db;}
    .cal-pct{font-size:9px;color:#6b7280;line-height:1;margin-top:1px;}

    /* monthly stats */
    .section-title{font-size:14px;font-weight:700;color:#374151;margin-bottom:10px;}
    .stats-table{width:100%;border-collapse:collapse;font-size:13px;}
    .stats-table th{text-align:left;padding:6px 6px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb;font-size:12px;}
    .stats-table th.r,.stats-table td.r{text-align:right;}
    .stats-table td{padding:8px 6px;color:#374151;border-bottom:1px solid #f3f4f6;}
    .stats-table tr:last-child td{border-bottom:none;}
    .mini-bar-bg{height:4px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:3px;}
    .mini-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#8b5cf6);}
    .sdot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px;}

    /* ════════════════════════════════
       DATE DETAIL PANEL (Monthly)
       ════════════════════════════════ */
    .detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:250;}
    .detail-overlay.open{display:block;}
    .detail-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:1024px;background:#fff;border-radius:20px 20px 0 0;padding:16px 20px 40px;max-height:70vh;overflow-y:auto;z-index:260;animation:slideUp .25s ease;}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
    .detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .detail-title{font-size:16px;font-weight:700;color:#111827;}
    .detail-close{background:none;border:none;font-size:20px;color:#9ca3af;cursor:pointer;padding:2px 6px;}
    .detail-progress{font-size:13px;color:#6b7280;margin-bottom:10px;}
    .detail-progress strong{color:#6366f1;}

    /* ════════════════════════════════
       FABs
       ════════════════════════════════ */
    .fab-sub{position:fixed;bottom:24px;right:20px;width:48px;height:48px;border-radius:50%;background:#fff;color:#6b7280;border:1.5px solid #e5e7eb;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;z-index:200;transition:background .15s;}
    .fab-sub:hover{background:#f3f4f6;}
    .add-task-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s;}
    .add-task-btn:hover{background:#4f46e5;}

    /* ════════════════════════════════
       MODALS
       ════════════════════════════════ */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:1024px;max-height:92vh;overflow-y:auto;padding:20px 20px 40px;animation:slideUpM .25s ease;}
    @keyframes slideUpM{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .handle{width:38px;height:4px;background:#e5e7eb;border-radius:999px;margin:0 auto 18px;}
    .modal-title{font-size:18px;font-weight:700;color:#111827;margin-bottom:18px;}
    .form-group{margin-bottom:14px;}
    .form-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;display:block;}
    .form-input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;outline:none;transition:border-color .2s;}
    .form-input:focus{border-color:#6366f1;}
    .form-row{display:flex;gap:8px;}
    .form-row .form-input{flex:1;}

    /* time inputs */
    .time-row{display:flex;align-items:center;gap:8px;}
    .time-row .form-input{flex:1;}
    .time-sep{color:#9ca3af;font-size:14px;flex-shrink:0;}

    /* Category */
    .cat-opts{display:flex;flex-wrap:wrap;gap:7px;}
    .cat-opt{padding:6px 14px;border-radius:999px;border:2px solid transparent;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
    .cat-opt.sel{border-color:currentColor;}

    /* Repeat */
    .repeat-opts{display:flex;gap:7px;}
    .repeat-btn{flex:1;padding:10px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:12px;cursor:pointer;font-weight:500;color:#374151;transition:all .15s;}
    .repeat-btn.active{border-color:#6366f1;color:#6366f1;background:#eef2ff;}

    /* Day picker */
    .day-picker{display:flex;gap:6px;}
    .day-pick-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;cursor:pointer;font-weight:500;color:#374151;transition:all .15s;}
    .day-pick-btn.active{border-color:#6366f1;background:#6366f1;color:#fff;}

    /* Date tags */
    .date-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .date-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;background:#eef2ff;color:#6366f1;border-radius:999px;font-size:13px;font-weight:500;}
    .date-tag-del{background:none;border:none;color:#6366f1;cursor:pointer;font-size:14px;padding:0;line-height:1;}

    /* Buttons */
    .btn-primary{width:100%;padding:13px;background:#6366f1;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s;}
    .btn-primary:hover{background:#4f46e5;}
    .btn-secondary{width:100%;padding:12px;background:#f3f4f6;color:#374151;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;}
    .btn-secondary:hover{background:#e5e7eb;}
    .btn-danger{background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;margin-top:8px;}

    /* Manage */
    .tabs-manage{display:flex;margin-bottom:16px;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;}
    .tab-manage-btn{flex:1;padding:9px;border:none;background:#fff;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;transition:all .15s;}
    .tab-manage-btn.active{background:#6366f1;color:#fff;font-weight:700;}
    .manage-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #f3f4f6;}
    .manage-item:last-child{border-bottom:none;}
    .manage-text{flex:1;}
    .manage-name{font-size:14px;color:#374151;}
    .manage-sub{font-size:12px;color:#9ca3af;margin-top:1px;}
    .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .cat-manage-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;}
    .cat-manage-item:last-child{border-bottom:none;}
    .cat-swatch{width:22px;height:22px;border-radius:6px;flex-shrink:0;}
    .color-opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
    .color-opt{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .1s;}
    .color-opt.sel{border-color:#111;transform:scale(1.15);}

    /* ── Modal delete button (상단 이동) ── */
    .modal-del-btn{background:none;border:none;color:#ef4444;cursor:pointer;padding:6px 10px;border-radius:8px;font-size:14px;font-weight:500;transition:background .15s;line-height:1;}
    .modal-del-btn:hover{background:#fef2f2;}

    /* ── App header ── */
    .app-header{background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 60%,#a78bfa 100%);padding:22px 20px 28px;text-align:center;}
    .app-header-title{font-size:19px;font-weight:800;color:#fff;letter-spacing:-0.3px;line-height:1.3;}
    .app-header-deco{font-size:11px;color:rgba(255,255,255,.6);margin-top:5px;letter-spacing:1px;}
    .app-header-by{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1.5px;}

    /* ── Note card ── */
    .note-card{background:#fffbeb;border:1.5px solid #fde68a;border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:border-color .2s,box-shadow .2s;}
    .note-card:hover{border-color:#f59e0b;box-shadow:0 2px 8px rgba(245,158,11,.15);}
    .note-card.editing{cursor:default;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
    .note-label{font-size:11px;font-weight:700;color:#b45309;margin-bottom:8px;display:flex;align-items:center;gap:5px;letter-spacing:.3px;}
    .note-body{font-size:14px;color:#374151;line-height:1.7;font-style:italic;white-space:pre-wrap;word-break:break-word;}
    .note-placeholder{color:#d1d5db;font-style:italic;font-size:14px;line-height:1.7;}
    .note-textarea{width:100%;border:none;background:transparent;font-size:14px;color:#374151;line-height:1.7;font-family:inherit;resize:none;outline:none;font-style:italic;min-height:52px;display:block;}
    .note-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:10px;}
    .note-save{padding:5px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
    .note-save:hover{background:#4f46e5;}
    .note-cancel{padding:5px 14px;background:#f3f4f6;color:#6b7280;border:none;border-radius:8px;font-size:12px;cursor:pointer;}

    /* ── Task type toggle & timeslot ── */
    .type-toggle{display:flex;margin-bottom:16px;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;}
    .type-btn{flex:1;padding:9px;border:none;background:#fff;font-size:13px;font-weight:500;color:#6b7280;cursor:pointer;transition:all .15s;}
    .type-btn.active{background:#6366f1;color:#fff;font-weight:700;}
    .timeslot-opts{display:flex;gap:7px;}
    .timeslot-btn{flex:1;padding:10px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;font-weight:500;color:#374151;transition:all .15s;}
    .timeslot-btn.active{border-color:#6366f1;color:#6366f1;background:#eef2ff;}
    .task-section-title{font-size:14px;font-weight:700;color:#374151;margin:16px 0 8px;}
    .task-slot-badge{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;flex-shrink:0;background:#f3f4f6;color:#6b7280;}
    .time-block-hd{font-size:12px;font-weight:700;color:#6b7280;margin:12px 0 4px 2px;}
    .time-block-hd:first-child{margin-top:2px;}
    /* ── Project View ── */
    .proj-filter{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;}
    .proj-filter::-webkit-scrollbar{display:none;}
    .proj-filter-btn{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1.5px solid;font-size:13px;font-weight:600;cursor:pointer;background:#fff;transition:all .15s;}
    .proj-cat-block{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px #0000000d;}
    .proj-cat-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .proj-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .proj-cat-name{font-size:14px;font-weight:700;color:#1f2937;flex:1;}
    .proj-cat-count{font-size:12px;color:#9ca3af;font-weight:500;}
    .proj-task-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;}
    .proj-task-row:last-child{border-bottom:none;}
    .proj-task-text{flex:1;font-size:13px;color:#374151;}
    .proj-task-row.done .proj-task-text{text-decoration:line-through;color:#c4c9d4;}
    .proj-task-row.done{opacity:.6;}
    .dday-badge{flex-shrink:0;font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;}
    .dday-badge.dday-today{background:#fef2f2;color:#ef4444;}
    .dday-badge.dday-tomorrow{background:#fff7ed;color:#f97316;}
    .dday-badge.dday-overdue{background:#fef2f2;color:#dc2626;}
    .dday-badge.dday-future{background:#eff6ff;color:#3b82f6;}
    .dday-badge.dday-none{background:#f3f4f6;color:#9ca3af;}

// Date helpers

const toStr = d => {
  const y   = d.getFullYear();
  const m   = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};
const todayStr = () => toStr(new Date());
function fmtFull(d) { return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_KR[d.getDay()]})`; }

function weekDates(offset) {
  const now = new Date(), dow = now.getDay();
  const diff = dow===0 ? 6 : dow-1;
  const mon = new Date(now); mon.setDate(now.getDate()-diff+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function monthDates(offset) {
  const now=new Date(), first=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const last=new Date(now.getFullYear(),now.getMonth()+offset+1,0);
  const out=[]; for(let d=new Date(first);d<=last;d.setDate(d.getDate()+1)) out.push(new Date(d));
  return out;
}

// ─────────────────────────────────────────
// Routine helpers

function routineOnDate(r, ds) {
  if (!r.repeat) return true; // 구버전 데이터 호환 (repeat 필드 없으면 매일로 처리)
  const dow = new Date(ds+'T00:00:00').getDay();
  if (r.repeat.type==='daily')    return true;
  if (r.repeat.type==='weekly')   return r.repeat.days.includes(dow);
  if (r.repeat.type==='specific') return r.repeat.dates.includes(ds);
  return false;
}
const routinesForDate = ds => {
  const skipped = getSkips()[ds] || [];
  const rs = getRoutines().filter(r =>
    routineOnDate(r, ds) &&
    !skipped.includes(r.id) &&
    (!r.startDate || ds >= r.startDate) &&
    (!r.endDate   || ds <= r.endDate)
  );
  const order = getRoutineOrder();
  return rs.sort((a, b) => {
    const ai = order.indexOf(a.id), bi = order.indexOf(b.id);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    const ta=a.time?.start||'99:99', tb=b.time?.start||'99:99';
    return ta.localeCompare(tb);
  });
};
const catById = id => getCats().find(c=>c.id===id) || {name:'기타',color:'#6b7280'};

function achievement(ds) {
  const rs       = routinesForDate(ds);
  const dayTasks = getTasks().filter(t => (t.startDate || t.dueDate) === ds);
  const total    = rs.length + dayTasks.length;
  if (!total) return null;
  const ck = getChecks(ds);
  const done = rs.filter(r=>ck[r.id]).length + dayTasks.filter(t=>t.done).length;
  return {done, total};
}

function fmtTime(r) {
  if (!r.time?.start) return '';
  return r.time.end ? `${r.time.start} ~ ${r.time.end}` : r.time.start;
}

function renderNote(ds) {

    }

}

function autoResizeTextarea(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function addDragDrop(containerEl, saveFn) {
  let dragSrc = null;
  containerEl.querySelectorAll('[data-drag-id]').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', function(e) {
      dragSrc = this;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => this.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', function() {
      this.classList.remove('dragging');
      containerEl.querySelectorAll('[data-drag-id]').forEach(e => e.classList.remove('drag-over'));
      dragSrc = null;
      saveFn([...containerEl.querySelectorAll('[data-drag-id]')].map(e => e.dataset.dragId));
    });
    el.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (!dragSrc || dragSrc === this) return;
      const mid = this.getBoundingClientRect().top + this.getBoundingClientRect().height / 2;
      if (e.clientY < mid) containerEl.insertBefore(dragSrc, this);
      else containerEl.insertBefore(dragSrc, this.nextSibling);
    });
  });
}

function renderDaily() {
  const ds      = toStr(dailyDate);
  const isToday = ds===todayStr();
  document.getElementById('daily-date-label').textContent = fmtFull(dailyDate);
  document.getElementById('daily-date-sub').textContent   = isToday?'오늘':'';
  document.getElementById('daily-today-btn').style.display = isToday ? 'none' : 'inline-block';

  const rs=routinesForDate(ds), ck=getChecks(ds);
  const dayTasks=getTasks().filter(t=>(t.startDate||t.dueDate)===ds);
  const done=rs.filter(r=>ck[r.id]).length + dayTasks.filter(t=>t.done).length;
  const total=rs.length + dayTasks.length;
  const pct=total?Math.round(done/total*100):0;

  document.getElementById('daily-pfill').style.width  = pct+'%';
  document.getElementById('daily-plabel').textContent = `${done} / ${total} 완료`;
  document.getElementById('daily-ppct').textContent   = pct+'%';
  const bannerEl=document.getElementById('daily-banner');
  if(total>0&&done===total){
    const dayNum=parseInt(ds.replace(/-/g,''),10);
    const quote=QUOTES[dayNum%QUOTES.length];
    bannerEl.innerHTML=`🎉 오늘 할 일 모두 완료!<br><span style="font-size:13px;font-weight:400;opacity:0.9;margin-top:5px;display:block">${quote}</span>`;
    bannerEl.style.display='block';
  } else {
    bannerEl.style.display='none';
  }

  noteEditing = false;
  renderNote(ds);
  renderOverdueSection();
  renderUrgentSection();

  const listEl=document.getElementById('daily-list');
  listEl.innerHTML='';
  if (!rs.length) { listEl.innerHTML='<div class="empty">이 날의 할 일이 없습니다.<br>+ 버튼으로 추가해 보세요.</div>'; }
  else {
    rs.forEach(r => {
      const item = buildRoutineItem(r, ds);
      item.dataset.dragId = r.id;
      listEl.appendChild(item);
    });
    addDragDrop(listEl, saveRoutineOrder);
  }
  renderDailyTasks(ds);
}

function moveTaskToDate(taskId, newDs) {
  const tasks = getTasks();
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  const oldDs = t.startDate || t.dueDate;
  if (oldDs === newDs) return;
  if (t.startDate) {
    if (t.dueDate === t.startDate) t.dueDate = newDs;
    t.startDate = newDs;
  } else {
    t.dueDate = newDs;
  }
  saveTasks(tasks);
  renderWeekly();
}

function renderWeekly() {
  const dates  = weekDates(weekOffset);
  const today  = todayStr();
  const s=dates[0], e=dates[6];
  document.getElementById('weekly-label').textContent =
    `${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`;
  document.getElementById('weekly-today-btn').style.display = weekOffset !== 0 ? 'inline-block' : 'none';

  let totDone=0, totTotal=0;
  const colsEl = document.getElementById('weekly-cols');
  colsEl.innerHTML='';

  dates.forEach((d,i)=>{
    const ds      = toStr(d);
    const isToday = ds===today;
    const rs       = routinesForDate(ds);
    const ck       = getChecks(ds);
    const dayTasks = getTasks().filter(t => (t.startDate || t.dueDate) === ds);
    const done     = rs.filter(r=>ck[r.id]).length + dayTasks.filter(t=>t.done).length;
    const total    = rs.length + dayTasks.length;
    const pct      = total?Math.round(done/total*100):0;
    if (total) { totDone+=done; totTotal+=total; }

    const col  = mk('div','week-col'+(isToday?' is-today':''));
    let _enterCount = 0;
    col.addEventListener('dragenter', (e) => { e.preventDefault(); _enterCount++; col.classList.add('drag-target'); });
    col.addEventListener('dragleave', ()  => { _enterCount--; if (_enterCount === 0) col.classList.remove('drag-target'); });
    col.addEventListener('dragover',  (e) => { e.preventDefault(); });
    col.addEventListener('drop',      (e) => { e.preventDefault(); _enterCount=0; col.classList.remove('drag-target'); const tid=e.dataTransfer.getData('taskId'); if(tid) moveTaskToDate(tid,ds); });

    // Header
    const head = mk('div','week-col-head');
    const dname= mk('div','wc-dayname'); dname.textContent=DAY_MON[i];
    const ddate= mk('div','wc-date');    ddate.textContent=`${d.getMonth()+1}/${d.getDate()}`;
    const barBg= mk('div','wc-bar-bg');
    const barFl= mk('div','wc-bar-fill'); barFl.style.width=(total?pct:0)+'%'; barBg.appendChild(barFl);
    const pctEl= mk('div','wc-pct');     pctEl.textContent=total?pct+'%':'-';
    head.append(dname,ddate,barBg,pctEl);

    // Body (routine list)
    const body = mk('div','week-col-body');
    if (!rs.length && !dayTasks.length) {
      const emp=mk('div','wc-empty'); emp.textContent='없음'; body.appendChild(emp);
    } else {
      rs.forEach(r=>{
        const cat    = catById(r.categoryId);
        const isDone = !!ck[r.id];
        const item   = mk('div','wc-item'+(isDone?' done':''));

        const cbtn   = mk('button','wc-check');
        cbtn.textContent = isDone?'✓':'';
        cbtn.style.borderColor = isDone?cat.color:'#d1d5db';
        cbtn.style.background  = isDone?cat.color:'#fff';
        cbtn.onclick = (e)=>{ e.stopPropagation(); toggleCheck(ds,r.id); };

        const dot  = mk('span','wc-dot'); dot.style.background=cat.color; dot.style.marginTop='3px';

        const bodyEl = mk('div','wc-body');
        const nameEl = mk('div','wc-name'); nameEl.textContent=r.text;
        bodyEl.appendChild(nameEl);
        const timeStr=fmtTime(r);
        if (timeStr){ const tEl=mk('div','wc-time'); tEl.textContent=timeStr; bodyEl.appendChild(tEl); }

        const editBtn= mk('button','wc-edit'); editBtn.textContent='✏️';
        editBtn.onclick=(e)=>{ e.stopPropagation(); _editContextDs = ds; openEditModal(r.id); };

        item.append(cbtn, dot, bodyEl, editBtn);
        item.onclick = ()=>toggleCheck(ds,r.id); // tap whole row = toggle
        body.appendChild(item);
      });

      // Task divider + task list
      if (dayTasks.length) {
        if (rs.length) {
          const div = mk('div',''); div.style.cssText='border-top:1px dashed #e5e7eb;margin:4px 2px;';
          body.appendChild(div);
        }
        dayTasks.forEach(t=>{
          const cat    = catById(t.categoryId);
          const item   = mk('div','wc-item'+(t.done?' done':''));

          const cbtn   = mk('button','wc-check');
          cbtn.textContent = t.done?'✓':'';
          cbtn.style.borderColor = t.done?cat.color:'#d1d5db';
          cbtn.style.background  = t.done?cat.color:'#fff';
          cbtn.onclick = (e)=>{ e.stopPropagation(); toggleTaskDone(t.id); };

          const dot  = mk('span','wc-dot'); dot.style.background=cat.color; dot.style.marginTop='3px';

          const bodyEl = mk('div','wc-body');
          const nameEl = mk('div','wc-name'); nameEl.textContent=t.text;
          bodyEl.appendChild(nameEl);
          if (t.timeSlot){ const tEl=mk('div','wc-time'); tEl.textContent=SLOT_LABEL[t.timeSlot]||''; bodyEl.appendChild(tEl); }

          const editBtn= mk('button','wc-edit'); editBtn.textContent='✏️';
          editBtn.onclick=(e)=>{ e.stopPropagation(); openEditTaskModal(t.id); };

          item.draggable = true;
          item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('taskId', t.id); e.dataTransfer.effectAllowed='move'; setTimeout(()=>item.classList.add('dragging'),0); });
          item.addEventListener('dragend', () => item.classList.remove('dragging'));
          item.append(cbtn, dot, bodyEl, editBtn);
          body.appendChild(item);
        });
      }
    }

    col.append(head, body);
    colsEl.appendChild(col);
  });

  const overallPct = totTotal?Math.round(totDone/totTotal*100):null;

  // ── 고양이 달성률 트랙 ──
  const catRunner = document.getElementById('cat-runner');
  const catBubble = document.getElementById('cat-bubble');
  const catEmoji  = document.getElementById('cat-emoji');
  if (overallPct !== null) {
    const pct = Math.min(100, overallPct);
    catRunner.style.left      = pct + '%';
    catRunner.style.transform = pct <= 3 ? 'translateX(0)' : pct >= 97 ? 'translateX(-100%)' : 'translateX(-50%)';
    catBubble.textContent     = overallPct + '%';
    catEmoji.textContent      = overallPct >= 100 ? '😺' : '🐱';
  } else {
    catRunner.style.left      = '0%';
    catRunner.style.transform = 'translateX(0)';
    catBubble.textContent     = '-';
    catEmoji.textContent      = '🐱';
  }
}

function renderMonthly() {
  const now=new Date();
  const tgt=new Date(now.getFullYear(),now.getMonth()+monthOffset,1);
  const y=tgt.getFullYear(), m=tgt.getMonth();
  document.getElementById('monthly-label').textContent=`${y}년 ${m+1}월`;
  document.getElementById('monthly-today-btn').style.display = monthOffset !== 0 ? 'inline-block' : 'none';

  const dates=monthDates(monthOffset), today=todayStr();
  const dateStrs=dates.map(d=>toStr(d));
  let totDone=0, totTotal=0;
  dateStrs.forEach(ds=>{ const a=achievement(ds); if(a){totDone+=a.done;totTotal+=a.total;} });
  const overallPct=totTotal?Math.round(totDone/totTotal*100):null;
  document.getElementById('monthly-big-pct').textContent=overallPct!==null?overallPct+'%':'-';

  // Calendar
  const calEl=document.getElementById('monthly-cal');
  calEl.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    const h=mk('div','cal-hd'+(i===0?' sun':i===6?' sat':''));
    h.textContent=d; calEl.appendChild(h);
  });
  const firstDow=dates[0].getDay();
  for(let i=0;i<firstDow;i++) calEl.appendChild(mk('div','cal-day empty'));

  dates.forEach(d=>{
    const ds   = toStr(d);
    const stat = achievement(ds);
    const isToday = ds===today;
    const isSel   = ds===selectedMonthDate;

    const cell=mk('div','cal-day'+(isToday?' is-today':'')+(isSel?' selected':''));
    cell.onclick=()=>openDetailPanel(ds);

    if (stat) {
      const pct=Math.round(stat.done/stat.total*100);
      let bg='#ddd6fe';
      if(pct===100) bg='#6366f1'; else if(pct>=70) bg='#8b5cf6'; else if(pct>=40) bg='#a78bfa';
      const circ=mk('div','cal-circle'); circ.style.background=bg; circ.textContent=d.getDate();
      const pctEl=mk('div','cal-pct'); pctEl.textContent=pct+'%';
      cell.append(circ,pctEl);
    } else {
      const isPast=d<new Date(today+'T00:00:00');
      const hasRoutines=routinesForDate(ds).length>0;
      const num=mk('div','cal-num'+(isPast&&!hasRoutines?' faded':'')); num.textContent=d.getDate();
      cell.appendChild(num);
    }
    calEl.appendChild(cell);
  });

  // Routine stats table
  const routines=getRoutines(), statsEl=document.getElementById('monthly-routine-stats');
  if (!routines.length){ statsEl.innerHTML='<div class="empty" style="padding:20px 0">등록된 할 일이 없습니다</div>'; return; }
  const tbl=document.createElement('table'); tbl.className='stats-table';
  tbl.innerHTML=`<thead><tr><th>할 일</th><th class="r">예정</th><th class="r">완료</th><th class="r">달성률</th></tr></thead>`;
  const tbody=document.createElement('tbody');
  routines.forEach(r=>{
    const cat=catById(r.categoryId); let sch=0,done=0;
    dateStrs.forEach(ds=>{ if(routineOnDate(r,ds)){sch++;if(getChecks(ds)[r.id])done++;} });
    if (!sch) return;
    const pct=Math.round(done/sch*100);
    const row=document.createElement('tr');
    row.innerHTML=`<td><span class="sdot" style="background:${cat.color}"></span>${r.text}</td><td class="r">${sch}</td><td class="r">${done}</td><td class="r">${pct}%<div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${pct}%"></div></div></td>`;
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody); statsEl.innerHTML=''; statsEl.appendChild(tbl);
}

// ─────────────────────────────────────────
// PROJECT VIEW
// ─────────────────────────────────────────
let projFilter = null; // null = 전체

function ddayInfo(dueDate) {
  if (!dueDate) return {text:'날짜 없음', cls:'dday-none'};
  const diff = daysBetween(todayStr(), dueDate);
  if (diff === 0) return {text:'D-0', cls:'dday-today'};
  if (diff === 1) return {text:'D-1', cls:'dday-tomorrow'};
  if (diff < 0)  return {text:`D+${Math.abs(diff)}`, cls:'dday-overdue'};
  return {text:`D-${diff}`, cls:'dday-future'};
}

function renderProject() {
  const cats          = getCats();
  const tasks         = getTasks();
  const today         = todayStr();
  const ck            = getChecks(today);
  const todayRoutines = routinesForDate(today);

  // ── 필터 버튼 ──
  const filterEl = document.getElementById('proj-filter');
  filterEl.innerHTML = '';

  const makeFilterBtn = (id, label, color) => {
    const active = projFilter === id;
    const btn = mk('button', 'proj-filter-btn');
    btn.textContent  = label;
    btn.style.borderColor = color;
    btn.style.color  = active ? '#fff' : color;
    btn.style.background = active ? color : '#fff';
    btn.onclick = () => { projFilter = id; renderProject(); };
    return btn;
  };

  filterEl.appendChild(makeFilterBtn(null, '전체', '#6366f1'));
  cats.forEach(cat => filterEl.appendChild(makeFilterBtn(cat.id, cat.name, cat.color)));

  // ── 카테고리 블록 ──
  const bodyEl = document.getElementById('proj-body');
  bodyEl.innerHTML = '';

  const visibleCats = projFilter ? cats.filter(c => c.id === projFilter) : cats;

  visibleCats.forEach(cat => {
    const catRoutines = todayRoutines.filter(r => r.categoryId === cat.id);
    const catTasks    = tasks.filter(t => t.categoryId === cat.id);
    if (!catRoutines.length && !catTasks.length) return;

    const undoneRoutines = catRoutines.filter(r => !ck[r.id]).length;
    const undoneTasks    = catTasks.filter(t => !t.done).length;

    const block = mk('div', 'proj-cat-block');
    const hd    = mk('div', 'proj-cat-hd');
    const dot   = mk('span', 'proj-cat-dot'); dot.style.background = cat.color;
    const name  = mk('span', 'proj-cat-name'); name.textContent = cat.name;
    const cnt   = mk('span', 'proj-cat-count'); cnt.textContent = `미완료 ${undoneRoutines + undoneTasks}개`;
    hd.append(dot, name, cnt);
    block.appendChild(hd);

    // 📌 루틴 섹션
    if (catRoutines.length) {
      const secHd = mk('div', 'proj-section-hd'); secHd.textContent = '📌 루틴';
      block.appendChild(secHd);

      const sorted = [...catRoutines].sort((a, b) => {
        const da = !!ck[a.id], db = !!ck[b.id];
        return da === db ? 0 : da ? 1 : -1;
      });

      sorted.forEach(r => {
        const isDone  = !!ck[r.id];
        const row     = mk('div', 'proj-routine-row' + (isDone ? ' done' : ''));
        const txt     = mk('span', 'proj-routine-text'); txt.textContent = r.text;
        const repType = r.repeat?.type || 'daily';
        const rdesc   = repType === 'daily' ? '매일'
          : repType === 'weekly' ? r.repeat.days.map(d => DAY_KR[d]).join('·') + '요일'
          : `${r.repeat.dates.length}일 지정`;
        const badge = mk('span', 'repeat-badge'); badge.textContent = rdesc;
        row.append(txt, badge);
        block.appendChild(row);
      });
    }

    // 📋 테스크 섹션
    if (catTasks.length) {
      const secHd = mk('div', 'proj-section-hd'); secHd.textContent = '📋 테스크';
      block.appendChild(secHd);

      catTasks.sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        const aDate = a.dueDate || a.startDate;
        const bDate = b.dueDate || b.startDate;
        if (!aDate && !bDate) return 0;
        if (!aDate) return 1;
        if (!bDate) return -1;
        return aDate.localeCompare(bDate);
      });

      catTasks.forEach(t => {
        const row   = mk('div', 'proj-task-row' + (t.done ? ' done' : ''));
        const txt   = mk('span', 'proj-task-text'); txt.textContent = t.text;
        const dd    = ddayInfo(t.dueDate);
        const badge = mk('span', 'dday-badge ' + dd.cls); badge.textContent = dd.text;
        row.append(txt, badge);
        block.appendChild(row);
      });
    }

    bodyEl.appendChild(block);
  });

  if (!bodyEl.children.length) {
    const empty = mk('div', '');
    empty.style.cssText = 'text-align:center;color:#9ca3af;padding:48px 0;font-size:14px;';
    empty.textContent = '표시할 내용이 없습니다.';
    bodyEl.appendChild(empty);
  }
}

  document.getElementById('add-time-start').value = '';

}

function renderDateList() {
  const el=document.getElementById('add-date-list'); el.innerHTML='';
  addDates.forEach((ds,i)=>{
    const tag=mk('div','date-tag');
    tag.innerHTML=`${ds} <button class="date-tag-del">×</button>`;
    tag.querySelector('.date-tag-del').onclick=()=>{ addDates.splice(i,1); renderDateList(); };

function submitRoutine() {
  if (addType==='task') { submitTask(); return; }
  const text=document.getElementById('add-text').value.trim();
  if (!text)                                          { alert('할 일 이름을 입력해 주세요.'); return; }
  if (addRepeatType==='weekly'   &&!addDays.length)   { alert('요일을 선택해 주세요.'); return; }
  if (addRepeatType==='specific' &&!addDates.length)  { alert('날짜를 추가해 주세요.'); return; }

  const routines=getRoutines();
  const timeInputActive = document.getElementById('panel-time-input').style.display !== 'none';
  const entry={
    id: editId||Date.now().toString(),
    text,
    categoryId: addCatId||getCats()[0]?.id,
    time: timeInputActive ? {
      start: document.getElementById('add-time-start').value||null,
      end:   document.getElementById('add-time-end').value  ||null,
    } : null,
    timeSlot: timeInputActive ? null : addTaskSlot,
    repeat:{type:addRepeatType, days:[...addDays], dates:[...addDates]},
    startDate: document.getElementById('add-start-date').value || null,
  };
  if (editId) {
    const idx=routines.findIndex(r=>r.id===editId);
    if (idx!==-1) routines[idx]=entry;
  } else { routines.push(entry); }
  saveRoutines(routines);
  closeAddModal(); renderCurrent();
}

// 삭제 범위 선택 시트
let _scopeTargetId = null;
let _scopeTargetDs = null;
let _editContextDs = null;

function _openScopeSheet() {
  document.getElementById('delete-scope-backdrop').style.display = 'block';
  document.getElementById('delete-scope-sheet').style.display = 'block';
}
function _closeScopeSheet() {
  document.getElementById('delete-scope-backdrop').style.display = 'none';
  document.getElementById('delete-scope-sheet').style.display = 'none';
}

function delScopeOnlyToday() {
  const skips = getSkips();
  if (!skips[_scopeTargetDs]) skips[_scopeTargetDs] = [];
  if (!skips[_scopeTargetDs].includes(_scopeTargetId)) skips[_scopeTargetDs].push(_scopeTargetId);
  saveSkips(skips);
  _closeScopeSheet(); closeAddModal(); renderCurrent();
}
function delScopeFromToday() {
  const routines = getRoutines();
  const idx = routines.findIndex(x => x.id === _scopeTargetId);
  if (idx !== -1) {
    const d = new Date(_scopeTargetDs + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    routines[idx].endDate = toStr(d);
    saveRoutines(routines);
  }
  _closeScopeSheet(); closeAddModal(); renderCurrent();
}
function delScopeAll() {
  saveRoutines(getRoutines().filter(x => x.id !== _scopeTargetId));
  _closeScopeSheet(); closeAddModal(); renderCurrent();
}

function deleteCurrentRoutine() {
  if (editTaskId) { deleteTask(editTaskId); return; }
  if (!editId) return;
  const r = getRoutines().find(x => x.id === editId);
  if (!r) return;
  _scopeTargetId = editId;
  _scopeTargetDs = _editContextDs || toStr(dailyDate);
  _openScopeSheet();
}

function skipForDay(ds, routineId) {
  if (!confirm('오늘만 이 항목을 숨길까요?')) return;
  const skips = getSkips();
  if (!skips[ds]) skips[ds] = [];
  if (!skips[ds].includes(routineId)) skips[ds].push(routineId);
  saveSkips(skips);
  renderCurrent();
}

function renderManageCategories() {
  const el=document.getElementById('manage-categories'); el.innerHTML='';

  const cats=getCats();
  cats.forEach((cat,idx)=>{
    const wrap=mk('div','');

    const item=mk('div','cat-manage-item'); item.style.borderBottom='none';

    upBtn.style.cssText='font-size:15px;color:#9ca3af;';
    if(idx===0)upBtn.style.opacity='0.25';
    upBtn.onclick=()=>{if(idx===0)return;const c=getCats();[c[idx-1],c[idx]]=[c[idx],c[idx-1]];saveCats(c);renderManageCategories();renderCurrent();};
    const downBtn=mk('button','icon-btn'); downBtn.textContent='↓'; downBtn.title='아래로';
    downBtn.style.cssText='font-size:15px;color:#9ca3af;';
    if(idx===cats.length-1)downBtn.style.opacity='0.25';
    downBtn.onclick=()=>{if(idx===cats.length-1)return;const c=getCats();[c[idx],c[idx+1]]=[c[idx+1],c[idx]];saveCats(c);renderManageCategories();renderCurrent();};

    // 색상 스워치 (클릭하면 팔레트 토글)
    const sw=mk('div','cat-swatch');
    sw.style.cssText=`background:${cat.color};cursor:pointer;flex-shrink:0;`;
    sw.title='색상 변경';

    // 인라인 팔레트
    const palRow=mk('div','color-opts');
    palRow.style.cssText='display:none;padding:4px 0 10px 30px;';
    PALETTE.forEach(c=>{
      const btn=mk('div','color-opt'+(c===cat.color?' sel':''));
      btn.style.background=c;
      btn.onclick=()=>{
        const cats=getCats(); const idx=cats.findIndex(x=>x.id===cat.id);
        if(idx!==-1){cats[idx].color=c; saveCats(cats);}
        renderManageCategories(); renderCurrent();
      };
      palRow.appendChild(btn);
    });
    sw.onclick=()=>{ palRow.style.display=palRow.style.display==='none'?'flex':'none'; };

    // 이름 직접 입력 필드
    const nameInput=mk('input','form-input');
    nameInput.value=cat.name; nameInput.maxLength=12;
    nameInput.style.cssText='flex:1;padding:7px 10px;font-size:13px;';
    const doSave=()=>{
      const n=nameInput.value.trim();
      if(!n){nameInput.value=cat.name;return;}
      if(n===cat.name) return;
      const cats=getCats(); const idx=cats.findIndex(x=>x.id===cat.id);
      if(idx!==-1){cats[idx].name=n; saveCats(cats); renderCurrent();}
    };
    nameInput.onblur=doSave;
    nameInput.onkeydown=e=>{if(e.key==='Enter'){doSave();nameInput.blur();}};

    // 삭제 버튼
    const delBtn=mk('button','icon-btn'); delBtn.textContent='×'; delBtn.style.fontSize='20px';
    delBtn.onclick=()=>{
      if(!confirm(`"${cat.name}" 카테고리를 삭제합니다.\n해당 카테고리의 할 일은 '기타'로 변경됩니다.`)) return;
      saveCats(getCats().filter(c=>c.id!==cat.id));
      saveRoutines(getRoutines().map(r=>r.categoryId===cat.id?{...r,categoryId:'other'}:r));
      renderManageCategories(); renderCurrent();
    };

    item.append(upBtn,downBtn,sw,nameInput,delBtn);
    wrap.appendChild(item);
    wrap.appendChild(palRow);
    wrap.style.borderBottom='1px solid #f3f4f6';
    el.appendChild(wrap);
  });

  // 새 카테고리 추가 행
  const addSection=mk('div',''); addSection.style.cssText='padding-top:14px;margin-top:4px;';
  let newColor=PALETTE[getCats().length%PALETTE.length];

  const addRow=mk('div',''); addRow.style.cssText='display:flex;align-items:center;gap:8px;';

  newSw.style.cssText=`background:${newColor};cursor:pointer;flex-shrink:0;`;
  newSw.title='색상 선택';

  const newPalRow=mk('div','color-opts');
  newPalRow.style.cssText='display:none;padding:6px 0 4px 30px;';
  const refreshNewPal=()=>{
    newPalRow.innerHTML='';
    PALETTE.forEach(c=>{
      const btn=mk('div','color-opt'+(c===newColor?' sel':''));
      btn.style.background=c;
      btn.onclick=()=>{ newColor=c; newSw.style.background=c; newPalRow.style.display='none'; refreshNewPal(); };
      newPalRow.appendChild(btn);
    });
  };
  refreshNewPal();
  newSw.onclick=()=>{ newPalRow.style.display=newPalRow.style.display==='none'?'flex':'none'; };

  const newInput=mk('input','form-input');
  newInput.placeholder='새 카테고리 이름'; newInput.maxLength=12;
  newInput.style.cssText='flex:1;padding:7px 10px;font-size:13px;';

    const name=newInput.value.trim();

    const cats=getCats();
    cats.push({id:Date.now().toString(),name,color:newColor});
    saveCats(cats); renderManageCategories(); renderCurrent();
  };
  addBtn.onclick=doAdd;
  newInput.onkeydown=e=>{if(e.key==='Enter')doAdd();};

  addRow.append(newSw,newInput,addBtn);
  addSection.appendChild(addRow);
  addSection.appendChild(newPalRow);
  el.appendChild(addSection);
}

function setAddType(type) {
  addType = type;
  const repeatBtn = document.getElementById('btn-repeat-toggle');
  if (type === 'routine') {
    repeatBtn.style.background  = '#6366f1';
    repeatBtn.style.color       = '#fff';
    repeatBtn.style.borderColor = '#6366f1';
  } else {
    repeatBtn.style.background  = '#fff';
    repeatBtn.style.color       = '#9ca3af';
    repeatBtn.style.borderColor = '#d1d5db';
  }
  document.getElementById('panel-repeat-main').style.display = type === 'routine' ? 'block' : 'none';
  document.getElementById('panel-start-date').style.display  = type === 'routine' ? 'block' : 'none';
  if (type === 'task') {
    document.getElementById('panel-weekly').style.display   = 'none';
    document.getElementById('panel-specific').style.display = 'none';
  }
  document.getElementById('panel-task-fields').style.display = type === 'task' ? 'block' : 'none';
}

function setTimeMode(slot) {
  if (slot === '__time__') {
    // ⏰ 시간 입력 활성화
    addTaskSlot = null;
    document.querySelectorAll('.timeslot-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-time-input'));
    document.getElementById('panel-time-input').style.display = 'block';
  } else {
    // 오전/오후/저녁 선택 (토글)
    addTaskSlot = (addTaskSlot === slot) ? null : slot;
    document.querySelectorAll('.timeslot-btn').forEach(b => b.classList.toggle('active', b.dataset.slot === addTaskSlot));
    document.getElementById('panel-time-input').style.display = 'none';
    document.getElementById('add-time-start').value = '';
    document.getElementById('add-time-end').value   = '';
  }
}

function submitTask() {
  const text      = document.getElementById('add-text').value.trim();
  const startDate = document.getElementById('add-task-start-date').value || todayStr();
  const dueDate   = document.getElementById('add-due-date').value || '';
  if (!text) { alert('할 일 이름을 입력해 주세요.'); return; }

  const tasks = getTasks();
  const timeInputActive = document.getElementById('panel-time-input').style.display !== 'none';
  const entry = {
    id:         editTaskId || Date.now().toString(),
    text,
    categoryId: addCatId || getCats()[0]?.id,
    startDate,
    dueDate,
    timeSlot:   timeInputActive ? null : addTaskSlot,
    time:       timeInputActive ? {
      start: document.getElementById('add-time-start').value || null,
      end:   document.getElementById('add-time-end').value   || null,
    } : null,
    done:       false,
    createdAt:  new Date().toISOString(),
  };
  if (editTaskId) {
    const idx = tasks.findIndex(t => t.id === editTaskId);
    if (idx !== -1) { entry.done = tasks[idx].done; tasks[idx] = entry; }
    else tasks.push(entry);
  } else {
    tasks.push(entry);
  }
  saveTasks(tasks);
  closeAddModal();
  renderCurrent();
}

function toggleTaskDone(id) {
  const tasks = getTasks();
  const idx   = tasks.findIndex(t => t.id === id);
  if (idx !== -1) { tasks[idx].done = !tasks[idx].done; saveTasks(tasks); }
  renderCurrent();
}

function deleteTask(id) {
  const t = getTasks().find(x => x.id === id);
  if (!t || !confirm('이 항목을 삭제하시겠습니까?')) return;
  saveTasks(getTasks().filter(x => x.id !== id));
  closeAddModal();
  renderCurrent();
}

function openEditTaskModal(id) {
  const t = getTasks().find(x => x.id === id);
  if (!t) return;
  editTaskId = id; editId = null;
  document.getElementById('modal-add-title').textContent = '테스크 수정';
  document.getElementById('add-text').value              = t.text;
  document.getElementById('add-delete').style.display    = 'block';
  addCatId    = t.categoryId;
  addTaskSlot = t.timeSlot || null;
  document.getElementById('add-task-start-date').value = t.startDate || todayStr();
  document.getElementById('add-due-date').value         = t.dueDate  || '';
  // 시간 설정 복원
  document.querySelectorAll('.timeslot-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-time-input').style.display = 'none';
  document.getElementById('add-time-start').value = '';
  document.getElementById('add-time-end').value   = '';

    document.getElementById('add-time-start').value = t.time.start || '';
    document.getElementById('add-time-end').value   = t.time.end   || '';

    document.querySelectorAll('.timeslot-btn').forEach(b=>b.classList.toggle('active', b.dataset.slot === t.timeSlot));
  }
  setAddType('task');
  renderCatOpts();
  document.getElementById('modal-add').classList.add('open');
}

const SLOT_LABEL = {morning:'오전', afternoon:'오후', evening:'저녁'};

function buildTaskItem(t) {
  const cat = catById(t.categoryId);
  const el  = mk('div', 'routine-item' + (t.done ? ' done' : ''));

  const bar = mk('div', 'cat-bar'); bar.style.background = cat.color;

  const cb = mk('button', 'check-btn');
  cb.textContent       = t.done ? '✓' : '';
  cb.style.borderColor = t.done ? cat.color : '#d1d5db';
  cb.style.background  = t.done ? cat.color : '#fff';
  cb.onclick = () => toggleTaskDone(t.id);

  const info = mk('div', 'routine-info');
  const txt  = mk('div', 'routine-text'); txt.textContent = t.text;
  info.appendChild(txt);

  const badge = mk('span', 'cat-badge');
  badge.textContent      = cat.name;
  badge.style.background = cat.color + '20';
  badge.style.color      = cat.color;

  el.append(bar, cb, info, badge);

  if (t.timeSlot) {
    const slotBadge = mk('span', 'task-slot-badge');
    slotBadge.textContent = SLOT_LABEL[t.timeSlot] || '';
    el.appendChild(slotBadge);
  }

  const editBtn = mk('button', 'icon-btn');
  editBtn.textContent = '✏️'; editBtn.style.color = '#9ca3af';
  editBtn.onclick = () => openEditTaskModal(t.id);
  el.appendChild(editBtn);

  return el;
}

function renderDailyTasks(ds) {
  const tasks   = getTasks().filter(t => (t.startDate || t.dueDate) === ds);
  const section = document.getElementById('daily-tasks-section');
  const listEl  = document.getElementById('daily-tasks-list');

  if (!tasks.length) { section.style.display = 'none'; return; }

  const SLOTS = [
    {key:'morning',   label:'🌅 오전'},
    {key:'afternoon', label:'☀️ 오후'},
    {key:'evening',   label:'🌙 저녁'},
    {key:null,        label:'⏱ 시간대 미정'},
  ];

  section.style.display = 'block';
  listEl.innerHTML = '';

  const tOrder = getTaskOrder();
  SLOTS.forEach(({key, label}) => {
    const group = tasks.filter(t => (t.timeSlot || null) === key);
    if (!group.length) return;
    group.sort((a, b) => {
      const ai = tOrder.indexOf(a.id), bi = tOrder.indexOf(b.id);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      return a.done === b.done ? 0 : a.done ? 1 : -1;
    });
    const hd = mk('div', 'time-block-hd'); hd.textContent = label;
    listEl.appendChild(hd);
    const wrap = mk('div');
    group.forEach(t => {
      const item = buildTaskItem(t);
      item.dataset.dragId = t.id;
      wrap.appendChild(item);
    });
    listEl.appendChild(wrap);
    addDragDrop(wrap, (slotIds) => {
      const slotSet = new Set(slotIds);
      const merged = [...getTaskOrder().filter(id => !slotSet.has(id)), ...slotIds];
      localStorage.setItem('taskOrder', JSON.stringify(merged));
      if (window.saveToCloud) saveToCloud();
    });
  });
}

// 작업 5: Web Audio API 알림음
function playNotificationSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    osc1.connect(gain); osc2.connect(gain);
    gain.connect(ctx.destination);
    osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, ctx.currentTime);
    osc2.type = 'sine'; osc2.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc1.start(ctx.currentTime); osc1.stop(ctx.currentTime + 0.2);
    osc2.start(ctx.currentTime + 0.15); osc2.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

// 알림 발송 — SW가 활성화된 환경은 showNotification() 사용 (Chrome 권장)
function sendNotification(title, body) {
  console.log('[알림] sendNotification 호출 — 권한:', Notification.permission, '| 제목:', title);
  if (!('Notification' in window)) { console.warn('[알림] 이 브라우저는 알림을 지원하지 않습니다.'); return; }
  if (Notification.permission !== 'granted') { console.warn('[알림] 권한 없음 — 발송 취소 (현재 상태:', Notification.permission + ')'); return; }
  playNotificationSound();
  try {
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      // Service Worker 활성화 상태: showNotification() 사용
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(title, { body, icon: '/jinsplanner/icons/icon-192.png' });
        console.log('[알림] SW showNotification 전송 완료');
      }).catch(err => {
        console.warn('[알림] SW showNotification 실패, Notification() 폴백:', err);
        new Notification(title, { body, icon: '/jinsplanner/icons/icon-192.png' });
      });
    } else {
      new Notification(title, { body, icon: '/jinsplanner/icons/icon-192.png' });
      console.log('[알림] new Notification() 전송 완료');
    }
  } catch(e) {
    console.error('[알림] Notification 생성 실패:', e);
  }
}

// 작업 1: 알림 권한 요청 (비동기 처리)
async function requestNotifPermission() {
  if (!('Notification' in window)) { console.warn('[알림] 브라우저 알림 미지원'); return; }
  console.log('[알림] 현재 권한 상태:', Notification.permission);
  if (Notification.permission === 'default') {
    const result = await Notification.requestPermission();
    console.log('[알림] 권한 요청 결과:', result);
  }
}

// 작업 2: 하루 요약 알림 스케줄러
let _dailySummaryTimer = null;
function scheduleDailySummary() {
  if (_dailySummaryTimer) clearTimeout(_dailySummaryTimer);
  const settings = getNotifSettings();
  const [h, m] = (settings.dailyTime || '09:00').split(':').map(Number);
  const now = new Date();
  const target = new Date();
  target.setHours(h, m, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  const diff = target - now;
  console.log(`[알림] 하루 요약 알림 예약 — ${settings.dailyTime || '09:00'} (약 ${Math.round(diff / 60000)}분 후)`);
  _dailySummaryTimer = setTimeout(() => {
    const today = todayStr();
    const rs = routinesForDate(today);
    const dayTasks = getTasks().filter(t => (t.startDate || t.dueDate) === today);
    const total = rs.length + dayTasks.length;
    sendNotification('오늘도, 한 걸음 🌱', `오늘 ${total}개의 작은 성취가 기다려요 🌱`);
    scheduleDailySummary();
  }, diff);
}

// 작업 3: 할 일 시작 알림 스케줄러
const _taskNotifTimers = {};
function scheduleTaskNotifications() {
  Object.values(_taskNotifTimers).forEach(id => clearTimeout(id));
  Object.keys(_taskNotifTimers).forEach(k => delete _taskNotifTimers[k]);
  const today = todayStr();
  const now = new Date();
  const targets = getTasks().filter(t => (t.startDate || t.dueDate) === today && !t.done && t.time && t.time.start);
  console.log(`[알림] 할 일 시작 알림 등록 대상: ${targets.length}개`);
  targets.forEach(t => {
    const [h, m] = t.time.start.split(':').map(Number);
    const target = new Date(); target.setHours(h, m, 0, 0);
    const diff = target - now;
    if (diff > 0) {
      console.log(`[알림] "${t.text}" 알림 등록 — ${t.time.start} (약 ${Math.round(diff / 60000)}분 후)`);
      _taskNotifTimers[t.id] = setTimeout(() => {
        sendNotification('오늘도, 한 걸음 🌅', `${t.text} 시작할 시간이에요!`);
      }, diff);
    } else {
      console.log(`[알림] "${t.text}" — 이미 지난 시간(${t.time.start}), 건너뜀`);
    }
  });
}

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
console.log('[앱] 메인 스크립트 실행 시작');
if (!localStorage.getItem('cats')) saveCats(DEFAULT_CATS);
renderCurrent();

// Firebase 모듈 스크립트에서도 호출할 수 있도록 window에 노출
window.scheduleDailySummary     = scheduleDailySummary;
window.scheduleTaskNotifications = scheduleTaskNotifications;
window.requestNotifPermission   = requestNotifPermission;

requestNotifPermission().then(() => {
  scheduleDailySummary();
  scheduleTaskNotifications();
});
console.log('[앱] 알림 스케줄러 초기화 완료');
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAKOU49vWsJILNQzutNsfmA8Jzs_nuLYog",
    authDomain: "jinsplanner.firebaseapp.com",
    projectId: "jinsplanner",
    storageBucket: "jinsplanner.firebasestorage.app",
    messagingSenderId: "958045716171",
    appId: "1:958045716171:web:f2a1e11facb9b3511e254e",
    measurementId: "G-PX251D2R59"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  function isInAppBrowser() {
    const ua = navigator.userAgent;
    return /FBAN|FBAV|Instagram|Line|KakaoTalk|NAVER|Snapchat|Twitter|Pinterest|LinkedIn|WhatsApp/i.test(ua)
      || (ua.includes('wv') && ua.includes('Android'))
      || /\bWebView\b/i.test(ua);
  }

  function showAuthError(e) {
    console.error(e);
    const el = document.getElementById('auth-error');
    if (!el) return;
    el.textContent = '로그인 오류: ' + (e.message || e.code || '알 수 없는 오류');
    el.style.display = 'block';
  }

  function showInAppBrowserError() {
    const el = document.getElementById('auth-error');
    if (!el) return;
    el.innerHTML = 'Chrome 또는 Safari에서 열어주세요. 카카오톡·인스타 등 앱 내 브라우저에서는 Google 로그인이 차단됩니다. '
      + '<button onclick="navigator.clipboard.writeText(location.href).then(()=>alert(\'주소가 복사되었습니다.\'))" '
      + 'style="margin-left:6px;padding:2px 8px;border:1px solid #ef4444;border-radius:6px;background:white;color:#ef4444;font-size:11px;cursor:pointer;">주소 복사</button>';
    el.style.display = 'block';
  }

  // 리다이렉트 로그인 결과 처리 (페이지 복귀 시)
  getRedirectResult(auth).catch(showAuthError);

  // 로그인 함수
  window.googleLogin = async () => {
    const el = document.getElementById('auth-error');
    if (el) el.style.display = 'none';
    if (isInAppBrowser()) {
      showInAppBrowserError();
      return;
    }
    try {
      await signInWithRedirect(auth, provider);
    } catch (e) {
      showAuthError(e);
    }
  };

  // 로그아웃 함수
  window.googleLogout = async () => {
    await signOut(auth);
  };

  // 로그인 상태 감지
  onAuthStateChanged(auth, async (user) => {
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');

    if (user) {
      // 로그인 상태
      if (loginBtn) loginBtn.style.display = 'none';
      if (logoutBtn) logoutBtn.style.display = 'block';
      if (userInfo) userInfo.textContent = user.displayName + '님';

      // Firestore에서 데이터 불러오기
      const docRef = doc(db, 'users', user.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        if (data.appData) {
          const parsed = JSON.parse(data.appData);
          ['cats','routines','checks','notes','tasks','skips','notifSettings','routineOrder','taskOrder'].forEach(key => {
            if (parsed[key]) localStorage.setItem(key, parsed[key]);
          });
          if (window.renderCurrent) renderCurrent();
          // 클라우드 데이터 로드 후 알림 재스케줄
          if (window.scheduleDailySummary) window.scheduleDailySummary();
          if (window.scheduleTaskNotifications) window.scheduleTaskNotifications();
          console.log('[Firebase] 데이터 로드 후 알림 재스케줄 완료');
        }
      }
    } else {
      // 로그아웃 상태
      if (loginBtn) loginBtn.style.display = 'block';
      if (logoutBtn) logoutBtn.style.display = 'none';
      if (userInfo) userInfo.textContent = '';
    }
  });

  // 데이터 저장 함수 (Firestore)
  window.saveToCloud = async () => {
    const user = auth.currentUser;
    if (!user) return;
    const appData = JSON.stringify({
      cats:          localStorage.getItem('cats'),
      routines:      localStorage.getItem('routines'),
      checks:        localStorage.getItem('checks'),
      notes:         localStorage.getItem('notes'),
      tasks:         localStorage.getItem('tasks'),
      skips:         localStorage.getItem('skips'),
      notifSettings: localStorage.getItem('notifSettings'),
      routineOrder:  localStorage.getItem('routineOrder'),
      taskOrder:     localStorage.getItem('taskOrder'),
    });
    await setDoc(doc(db, 'users', user.uid), { appData });
  };
</script>
